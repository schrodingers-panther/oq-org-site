<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg"><!-- Background: Forest Green from your website --><rect width="800" height="800" fill="#083a33"/><defs><!-- Metallic Gold Gradient for a premium feel --><linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#f6d78f;stop-opacity:1" /><stop offset="50%" style="stop-color:#d6ae57;stop-opacity:1" /><stop offset="100%" style="stop-color:#b8892d;stop-opacity:1" /></linearGradient></defs><!-- Main Logo Group --><g transform="translate(400, 380)"><!-- Left 'O' Shape (Stylized open circle) -->
<g transform="translate(-145, 0)">
  <path d="M 80,-60 A 100,100 0 1,0 80,60" fill="none" stroke="url(#goldGradient)" stroke-width="32" stroke-linecap="butt"/>
</g>

<!-- Right 'Q' Shape (Stylized open circle with tail) -->
<g transform="translate(145, 0)">
  <path d="M -80,60 A 100,100 0 1,1 -80,-60" fill="none" stroke="url(#goldGradient)" stroke-width="32" stroke-linecap="butt"/>
  
  <!-- The Q tail/swish moved to the second letter for 'OQ' -->
  <!-- Curves from the bottom-left of the right circle towards the center -->
  <path d="M -85, 85 C -120, 120 -130, 160 -80, 185" fill="none" stroke="url(#goldGradient)" stroke-width="26" stroke-linecap="round"/>
</g>

<!-- Centered Logo Text -->
<text x="0" y="10" fill="#f8f0dc" text-anchor="middle" font-family="'Manrope', sans-serif" font-weight="800" font-size="32" letter-spacing="8">
  &lt;ORLANDO QAZAQTARY&gt;
</text>
</g></svg>